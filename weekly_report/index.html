<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주간 GSC 리포트</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #07122d;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      font-size: 14px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="loading">최신 리포트를 불러오는 중...</div>

  <script>
    (async function () {
      try {
        const res = await fetch("./latest.json?ts=" + Date.now(), { cache: "no-store" });
        if (!res.ok) throw new Error("latest.json load failed");

        const data = await res.json();
        if (!data.file) throw new Error("latest file missing");

        const target = "./" + data.file + "?v=" + data.version;
        window.location.replace(target);
      } catch (e) {
        document.body.innerHTML = '<div class="loading">리포트를 불러오지 못했어요.</div>';
        console.error(e);
      }
    })();
  </script>
</body>
</html>
