<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주간 GSC 리포트</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
    * {
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }
    body {
      margin: 0;
      font-family: "Pretendard", "Malgun Gothic", sans-serif;
      background: #07122d;
      color: #ffffff;
    }
    .wrap {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 22px 40px;
    }
    .report-title {
      font-size: 28px;
      font-weight: 800;
      margin: 0 0 10px 0;
    }
    .report-sub {
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 24px;
      line-height: 1.7;
    }
    .top-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .top-tab {
      display: inline-flex;
      align-items: center;
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
    }
    .top-tab.active {
      background: rgba(99,102,241,0.20);
      border-color: rgba(129,140,248,0.45);
    }
    .property-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .property-tab {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #fff;
      border-radius: 999px;
      padding: 9px 16px;
      cursor: pointer;
      font-weight: 700;
      min-width: 54px;
    }
    .property-tab.active {
      background: #0f172a;
      border-color: rgba(255,255,255,0.18);
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .card {
      background: rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 20px;
      min-height: 132px;
    }
    .card-label {
      font-size: 14px;
      color: #cbd5e1;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .card-value {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .card-delta {
      font-size: 14px;
      font-weight: 700;
    }
    .up {
      color: #ef4444;
    }
    .down {
      color: #3b82f6;
    }
    .neutral {
      color: #94a3b8;
    }
    .section {
      background: rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 20px;
      width: 100%;
      max-width: 100%;
    }
    .section-title {
      font-size: 18px;
      font-weight: 800;
      margin: 0 0 16px 0;
    }
    .summary-box {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px 18px;
      color: #fff;
      font-weight: 700;
    }
    .chart-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      width: 100%;
    }
    .chart-grid > * {
      min-width: 0;
    }
    .chart-box {
      background: rgba(255,255,255,0.04);
      border-radius: 14px;
      padding: 14px;
      overflow: hidden;
      width: 100%;
      max-width: 100%;
    }
    .chart-canvas-wrap {
      position: relative;
      width: 100%;
      height: 320px;
      min-width: 0;
    }
    .chart-canvas-wrap canvas {
      width: 100% !important;
      max-width: 100% !important;
    }
    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      width: 100%;
      max-width: 100%;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1220px;
    }
    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      text-align: center;
      font-size: 14px;
      white-space: nowrap;
    }
    th {
      color: #cbd5e1;
      font-weight: 800;
      background: rgba(255,255,255,0.04);
    }
    td {
      color: #fff;
    }
    .table-note {
      margin-top: 12px;
      color: #cbd5e1;
      font-size: 13px;
    }
    .footer {
      margin-top: 12px;
      text-align: right;
      color: #94a3b8;
      font-size: 12px;
    }

    @media (max-width: 1024px) {
      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .chart-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .wrap {
        padding: 12px 10px 20px;
      }

      .section {
        padding: 12px;
        margin-bottom: 14px;
        border-radius: 14px;
      }

      .cards {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .card {
        padding: 14px;
        min-height: auto;
        border-radius: 14px;
      }

      .card-label {
        font-size: 12px;
      }

      .card-value {
        font-size: 20px;
        margin-bottom: 6px;
      }

      .card-delta {
        font-size: 12px;
      }

      .section-title {
        font-size: 16px;
        margin-bottom: 12px;
      }

      .summary-box {
        padding: 12px 14px;
        font-size: 13px;
        line-height: 1.5;
      }

      .chart-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .chart-box {
        padding: 10px;
        border-radius: 12px;
      }

      .chart-canvas-wrap {
        height: 220px;
      }

      th, td {
        font-size: 11px;
        padding: 8px 6px;
      }
    }
  </style>
</head>

    </div>

      if (row.clicks_change !== null && row.clicks_change !== undefined) {
        parts.push(row.clicks_change > 0 ? "클릭 증가" : row.clicks_change < 0 ? "클릭 감소" : "클릭 유지");
      }
      if (row.impressions_change !== null && row.impressions_change !== undefined) {
        parts.push(row.impressions_change > 0 ? "노출 확대" : row.impressions_change < 0 ? "노출 감소" : "노출 유지");
      }
      if (row.ctr_diff !== null && row.ctr_diff !== undefined) {
        parts.push(row.ctr_diff > 0 ? "CTR 상승" : row.ctr_diff < 0 ? "CTR 하락" : "CTR 유지");
      }
      if (row.position_diff !== null && row.position_diff !== undefined) {
        parts.push(row.position_diff < 0 ? "평균 순위 개선" : row.position_diff > 0 ? "평균 순위 악화" : "평균 순위 유지");
      }

      return row.start_date + " ~ " + row.end_date + " 기준 " + parts.join(" · ");
    }

    function renderCards(rows) {
      const latest = rows.length ? rows[rows.length - 1] : null;

      document.getElementById("report-week").textContent = latest ? latest.week : "-";
      document.getElementById("report-period").textContent = latest ? (latest.start_date + " ~ " + latest.end_date) : "-";

      document.getElementById("clicks-label").textContent = latest ? latest.start_date + " 클릭" : "클릭";
      document.getElementById("clicks-value").textContent = latest ? fmtInt(latest.clicks) : "-";
      document.getElementById("clicks-delta").textContent = latest ? fmtPctChange(latest.clicks_change) : "-";
      document.getElementById("clicks-delta").className = "card-delta " + (latest ? deltaClass(latest.clicks_change) : "neutral");

      document.getElementById("impressions-label").textContent = latest ? latest.start_date + " 노출" : "노출";
      document.getElementById("impressions-value").textContent = latest ? fmtInt(latest.impressions) : "-";
      document.getElementById("impressions-delta").textContent = latest ? fmtPctChange(latest.impressions_change) : "-";
      document.getElementById("impressions-delta").className = "card-delta " + (latest ? deltaClass(latest.impressions_change) : "neutral");

      document.getElementById("ctr-label").textContent = latest ? latest.start_date + " CTR" : "CTR";
      document.getElementById("ctr-value").textContent = latest ? fmtPct(latest.ctr) : "-";
      document.getElementById("ctr-delta").textContent = latest ? fmtCtrDiff(latest.ctr_diff) : "-";
      document.getElementById("ctr-delta").className = "card-delta " + (latest ? deltaClass(latest.ctr_diff) : "neutral");

      document.getElementById("position-label").textContent = latest ? latest.start_date + " 평균 순위" : "평균 순위";
      document.getElementById("position-value").textContent = latest ? fmtNum(latest.position, 1) : "-";
      document.getElementById("position-delta").textContent = latest ? fmtPositionDiff(latest.position_diff) : "-";
      document.getElementById("position-delta").className = "card-delta " + (latest ? deltaClass(latest.position_diff, true) : "neutral");

      document.getElementById("summary-text").textContent = buildSummaryText(latest);
    }

    function renderTable(rows) {
      const tbody = document.getElementById("detail-tbody");
      tbody.innerHTML = "";

      const sorted = [...rows].sort((a, b) => new Date(b.start_date) - new Date(a.start_date));

      sorted.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${row.week}</td>
          <td>${row.start_date}</td>
          <td>${row.end_date}</td>
          <td>${fmtInt(row.clicks)}</td>
          <td>${fmtInt(row.impressions)}</td>
          <td>${fmtPct(row.ctr)}</td>
          <td>${fmtNum(row.position, 1)}</td>
          <td class="${deltaClass(row.clicks_change)}">${fmtPctChange(row.clicks_change)}</td>
          <td class="${deltaClass(row.impressions_change)}">${fmtPctChange(row.impressions_change)}</td>
          <td class="${deltaClass(row.ctr_diff)}">${fmtCtrDiff(row.ctr_diff)}</td>
          <td class="${deltaClass(row.position_diff, true)}">${fmtPositionDiff(row.position_diff)}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function destroyCharts() {
      if (clicksChart) clicksChart.destroy();
      if (ctrPositionChart) ctrPositionChart.destroy();
    }

    function commonChartOptions() {
      return {
        responsive: true,
        maintainAspectRatio: false,
        layout: {
          padding: {
            top: 8,
            right: 8,
            bottom: 8,
            left: 8
          }
        },
        plugins: {
          legend: {
            labels: {
              color: "#ffffff",
              boxWidth: 10,
              boxHeight: 6,
              padding: 8,
              font: {
                size: 10
              }
            }
          }
        }
      };
    }

    function renderCharts(propertyName) {
      destroyCharts();

      const cData = chartDataMap[propertyName] || { labels: [], clicks: [], impressions: [], ctr: [], position: [] };

      const ctx1 = document.getElementById("chartClicks").getContext("2d");
      clicksChart = new Chart(ctx1, {
        type: "bar",
        data: {
          labels: cData.labels,
          datasets: [
            {
              type: "bar",
              label: "Clicks",
              data: cData.clicks,
              backgroundColor: "rgba(96, 165, 250, 0.55)",
              borderColor: "rgba(96, 165, 250, 1)",
              borderWidth: 1,
              yAxisID: "y"
            },
            {
              type: "line",
              label: "Impressions",
              data: cData.impressions,
              borderColor: "rgba(244, 114, 182, 1)",
              backgroundColor: "rgba(244, 114, 182, 0.12)",
              tension: 0.3,
              yAxisID: "y1"
            }
          ]
        },
        options: {
          ...commonChartOptions(),
          scales: {
            x: {
              ticks: {
                color: "#cbd5e1",
                autoSkip: true,
                maxTicksLimit: 4,
                maxRotation: 0,
                minRotation: 0,
                font: { size: 9 }
              },
              grid: { color: "rgba(255,255,255,0.05)" }
            },
            y: {
              position: "left",
              ticks: {
                color: "#cbd5e1",
                font: { size: 10 }
              },
              grid: { color: "rgba(255,255,255,0.05)" },
              title: {
                display: false
              }
            },
            y1: {
              position: "right",
              ticks: {
                color: "#cbd5e1",
                font: { size: 10 }
              },
              grid: { drawOnChartArea: false },
              title: {
                display: false
              }
            }
          }
        }
      });

      const ctx2 = document.getElementById("chartCtrPosition").getContext("2d");
      ctrPositionChart = new Chart(ctx2, {
        type: "line",
        data: {
          labels: cData.labels,
          datasets: [
            {
              label: "CTR (%)",
              data: cData.ctr,
              borderColor: "rgba(59, 130, 246, 1)",
              backgroundColor: "rgba(59, 130, 246, 0.15)",
              tension: 0.3,
              yAxisID: "y"
            },
            {
              label: "Position",
              data: cData.position,
              borderColor: "rgba(244, 63, 94, 1)",
              backgroundColor: "rgba(244, 63, 94, 0.12)",
              tension: 0.3,
              yAxisID: "y1"
            }
          ]
        },
        options: {
          ...commonChartOptions(),
          scales: {
            x: {
              ticks: {
                color: "#cbd5e1",
                autoSkip: true,
                maxTicksLimit: 4,
                maxRotation: 0,
                minRotation: 0,
                font: { size: 9 }
              },
              grid: { color: "rgba(255,255,255,0.05)" }
            },
            y: {
              position: "left",
              ticks: {
                color: "#cbd5e1",
                font: { size: 10 }
              },
              grid: { color: "rgba(255,255,255,0.05)" },
              title: {
                display: false
              }
            },
            y1: {
              position: "right",
              reverse: true,
              ticks: {
                color: "#cbd5e1",
                font: { size: 10 }
              },
              grid: { drawOnChartArea: false },
              title: {
                display: false
              }
            }
          }
        }
      });
    }

    function renderProperty(propertyName) {
      currentProperty = propertyName;

      const completedRows = weeklyDataCompleted[propertyName] || [];
      const allRows = weeklyDataAll[propertyName] || [];

      document.querySelectorAll(".property-tab").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.property === propertyName);
      });

      renderCards(completedRows);
      renderTable(allRows);
      renderCharts(propertyName);
    }

    document.querySelectorAll(".property-tab").forEach(btn => {
      btn.addEventListener("click", () => {
        renderProperty(btn.dataset.property);
      });
    });

    renderProperty(currentProperty);
  </script>
</body>
</html>
